name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate tag and run tests
        run: |
          version="$(./scripts/plugin-version.sh)"
          test "$GITHUB_REF_NAME" = "v$version"
          prove -I. -v t
          node --check Plugins/LocalArtistRadio/HTML/EN/plugins/LocalArtistRadio/html/material-button.js

      - name: Build release and LMS repository
        run: |
          ./scripts/build-release.sh
          ./scripts/build-repository.sh
          unzip -t "dist/LocalArtistRadio-$(./scripts/plugin-version.sh).zip"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          archive="dist/LocalArtistRadio-$(./scripts/plugin-version.sh).zip"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$archive" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$archive" \
              --generate-notes \
              --title "Local Artist Radio $(./scripts/plugin-version.sh)"
          fi

      - name: Publish LMS repository manifest
        run: |
          cp dist/extensions.xml /tmp/extensions.xml
          git fetch origin main
          git checkout -B main origin/main
          cp /tmp/extensions.xml extensions.xml
          if git diff --quiet -- extensions.xml; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add extensions.xml
          git commit -m "Update LMS repository for $GITHUB_REF_NAME [skip ci]"
          git push origin main
